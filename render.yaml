services:
  - type: web
    name: jornal-tatu-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEWSAPI_KEY
        sync: false
      - key: BRAVE_API_KEY
        value: demo_key
