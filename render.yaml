services:
  - type: web
    name: jornal-tatu-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NEWSAPI_KEY
        value: ${NEWSAPI_KEY}
      - key: BRAVE_API_KEY
        value: ${BRAVE_API_KEY}

  - type: web
    name: jornal-tatu-frontend
    plan: free
    runtime: static
    buildCommand: echo "Frontend ready"
    startCommand: python3 -m http.server 3000 --directory .
    healthCheckPath: /
    routes:
      - path: /
        destination: http://localhost:3000
