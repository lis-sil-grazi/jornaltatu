<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste de Integração — Jornal Tatu</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; }
        .test-result { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .pass { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .fail { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        pre { background: #fff; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🐢 Jornal Tatu — Teste de Integração</h1>
    
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function log(title, status, message) {
            const div = document.createElement('div');
            div.className = `test-result ${status}`;
            div.innerHTML = `<strong>${title}:</strong> ${message}`;
            results.appendChild(div);
        }

        async function runTests() {
            log('Teste 1', 'info', 'Iniciando testes de integração...');

            try {
                // Test 1: Check backend availability
                const backendResponse = await fetch('http://localhost:3001/', {
                    mode: 'cors'
                });
                if (backendResponse.ok) {
                    log('Backend Responsivo', 'pass', '✓ Backend está respondendo em http://localhost:3001');
                } else {
                    log('Backend Status', 'fail', `✗ Status ${backendResponse.status}`);
                }
            } catch (e) {
                log('Backend Responsivo', 'fail', `✗ Erro: ${e.message}`);
            }

            // Test 2: Fetch Bitcoin news
            try {
                const newsResponse = await fetch('http://localhost:3001/api/news/bitcoin', {
                    mode: 'cors'
                });
                const data = await newsResponse.json();
                if (data.success && data.articles) {
                    log('Bitcoin News', 'pass', `✓ ${data.count} artigos carregados`);
                    log('Sample Article', 'info', `Primeiro: "${data.articles[0].title}"`);
                } else {
                    log('Bitcoin News', 'fail', '✗ Formato de resposta inválido');
                }
            } catch (e) {
                log('Bitcoin News', 'fail', `✗ Erro: ${e.message}`);
            }

            // Test 3: Test all categories
            const categories = ['bitcoin', 'wars', 'world-politics', 'brazil-politics', 'hospitality'];
            for (const cat of categories) {
                try {
                    const response = await fetch(`http://localhost:3001/api/news/${cat}`, { mode: 'cors' });
                    const data = await response.json();
                    if (data.success && data.articles) {
                        log(`Categoria: ${cat}`, 'pass', `✓ ${data.count} artigos`);
                    } else {
                        log(`Categoria: ${cat}`, 'fail', '✗ Falhou');
                    }
                } catch (e) {
                    log(`Categoria: ${cat}`, 'fail', `✗ ${e.message}`);
                }
            }

            log('Status Final', 'info', '✓ Testes concluídos. Abra http://localhost:8000 no navegador.');
        }

        // Run tests when page loads
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
